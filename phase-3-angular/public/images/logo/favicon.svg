<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle matching logo -->
  <circle cx="32" cy="32" r="30" stroke="#1B4F8A" stroke-width="3" fill="#0D3B6E"/>

  <!-- Globe - simplified world map silhouette -->
  <circle cx="32" cy="32" r="22" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/>

  <!-- Horizontal latitude lines -->
  <ellipse cx="32" cy="32" rx="22" ry="8" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
  <ellipse cx="32" cy="32" rx="22" ry="16" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>

  <!-- Vertical meridian lines -->
  <ellipse cx="32" cy="32" rx="8" ry="22" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
  <ellipse cx="32" cy="32" rx="15" ry="22" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>

  <!-- Simplified continent shapes -->
  <!-- North America -->
  <path d="M18 18 C20 16, 24 15, 26 16 C27 17, 28 19, 27 21 C26 23, 23 25, 21 26 C19 27, 17 25, 16 23 C15 21, 16 19, 18 18Z" fill="rgba(255,255,255,0.85)"/>

  <!-- South America -->
  <path d="M23 30 C25 29, 27 30, 27 32 C27 35, 26 38, 25 40 C24 42, 23 43, 22 42 C21 40, 21 37, 21 34 C21 32, 22 30, 23 30Z" fill="rgba(255,255,255,0.85)"/>

  <!-- Europe -->
  <path d="M32 16 C33 15, 35 16, 36 17 C37 18, 37 20, 36 21 C35 22, 34 22, 33 21 C32 20, 32 18, 32 16Z" fill="rgba(255,255,255,0.85)"/>
  <!-- Africa -->
  <path d="M33 24 C35 23, 37 24, 38 26 C39 28, 39 31, 38 34 C37 37, 36 39, 35 40 C34 41, 33 40, 32 38 C31 36, 31 32, 32 29 C32 27, 32 25, 33 24Z" fill="rgba(255,255,255,0.85)"/>

  <!-- Asia -->
  <path d="M38 15 C40 14, 43 15, 45 17 C47 19, 47 22, 46 24 C45 26, 43 27, 41 26 C39 25, 38 23, 37 21 C36 19, 37 16, 38 15Z" fill="rgba(255,255,255,0.85)"/>

  <!-- Australia -->
  <path d="M42 34 C44 33, 46 34, 47 36 C48 37, 47 39, 45 39 C43 39, 41 38, 41 36 C41 35, 41 34, 42 34Z" fill="rgba(255,255,255,0.85)"/>

  <!-- Lightning bolt accent -->
  <path d="M34 8 L30 20 L35 20 L29 32 L33 22 L28 22 L34 8Z" fill="#4DA8E8" opacity="0.6"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="30" stroke="url(#glowGrad)" stroke-width="2.5" fill="none"/>

  <defs>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#2E7BBF"/>
      <stop offset="50%" stop-color="#1B4F8A"/>
      <stop offset="100%" stop-color="#4DA8E8"/>
    </linearGradient>
  </defs>
</svg>
